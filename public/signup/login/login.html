<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/signup/login/login_styles.css">

    <!-----------ICON PACKAGE----------------->
    <link href='/boxicons/css/boxicons.min.css' rel='stylesheet'>
    <script src="/boxicons/dist/boxicons.js"></script>

    <!-----------ICON IMAGE----------------->
    <link rel="shortcut icon" href="/images/NIC Logo JPG/BILINGUAL _SQUARE_NIC_Logo_white_bg-01.jpg"
        type="image/x-icon">
    <title>LogIn</title>
</head>

<body style="background-color: #f2f5ff">
    <div class="container">

        <!------------------------------------TOP COLUMN---------------------------------------->
        <div class="horizontal-column" id="hrz-clmn">
            <div class="digital-india-logo">
                <img src="/images/digital-india.png" alt="Digital India Logo">
            </div>
            <div class="rak">
                <h1>DAK REGISTER</h1>
            </div>
            <div class="nic-logo">
                <img src="/images/NIC-Logo-white.png" alt="NIC Logo">
            </div>
        </div>

        <!------------------------------------INTRO--------------------------------------------->
        <div class="intro">
            <h2>Welcome To NIC Meghalaya</h2>
        </div>

        <!------------------------------------SIGN-UP & LOGIN----------------------------------->
        <div class="head">
            <b>LOG IN</b>
            <b>SIGN UP</b>
        </div>

        <div class="toggle-container">
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="flip-container" id="flipContainer">
            <div class="flipper">

                <!--------------------------------------LOGIN CARD--------------------------------------->
                <div class="front">
                    <div class="login-box" id="login-box">
                        <form id="loginForm" action="/">
                            <div class="outer-box">
                                <h2>Log In</h2>
                                <span class="card-underline"></span>

                                <label class="field-label">Phone Number</label>
                                <div class="input-box prefix-input-box">
                                    <span class="phone-prefix"><box-icon name='phone' color='#94a3b8' size='20px'
                                            style='margin-right: 6px;'></box-icon>+91</span>
                                    <input type="text" id="loginphoneNo" name="phone-number"
                                        placeholder="Enter your registered No" onkeyup="validNumber(this.value)"
                                        onkeypress="return (event.charCode > 47 && event.charCode < 58)"
                                        autocomplete="off" maxlength="10">
                                </div>

                                <div class="full-input-box">
                                    <label class="field-label">Verification</label>
                                    <div class="cap-in">
                                        <box-icon name='ghost' color='#94a3b8' size='20px'></box-icon>
                                        <input type="text" id="loginCaptchaInput" placeholder="Enter Captcha" required
                                            maxlength="6">
                                        <div class="captcha-right">
                                            <span id="login-captcha-text"></span>
                                            <button type="button" class="captcha-refresh-btn" id="loginRefreshCaptcha"
                                                title="Refresh Captcha">
                                                <box-icon name='refresh' color='#64748b' size='22px'
                                                    class="refresh-icon"></box-icon>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div class="below">
                                    <div class="log-btn">
                                        <button role="button" onclick="comparePhoneNo()">LOG IN</button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!------------------------------------------------REGISTER CARD----------------------------------------------->
                <div class="back">
                    <div class="register-box" id="register-box">
                        <form id="signupForm">
                            <div class="reg-box">
                                <h2>Sign Up</h2>
                                <p class="reg-subtitle">Create your administrative account</p>

                                <div class="name-row">
                                    <div class="half-input-box">
                                        <label class="field-label">First Name</label>
                                        <div class="input-inner">
                                            <box-icon name='user' color='#94a3b8' size='20px'></box-icon>
                                            <input type="text" id="Fname" name="name" placeholder="Enter first name"
                                                onkeypress="return (event.charCode > 64 && event.charCode < 91) || (event.charCode > 96 && event.charCode < 123)"
                                                autocomplete="off" required>
                                        </div>
                                    </div>
                                    <div class="half-input-box">
                                        <label class="field-label">Last Name</label>
                                        <div class="input-inner">
                                            <box-icon name='user' color='#94a3b8' size='20px'></box-icon>
                                            <input type="text" id="Lname" name="name" placeholder="Enter last name"
                                                onkeypress="return (event.charCode > 64 && event.charCode < 91) || (event.charCode > 96 && event.charCode < 123)"
                                                autocomplete="off" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="full-input-box">
                                    <label class="field-label">Phone Number</label>
                                    <div class="input-inner">
                                        <box-icon name='phone' color='#94a3b8' size='20px'></box-icon>
                                        <input type="text" id="registerphoneNo" name="phone-number"
                                            placeholder="10-digit mobile number"
                                            onkeypress="return (event.charCode > 47 && event.charCode < 58)"
                                            autocomplete="off" required maxlength="10">
                                        <span id="message"></span>
                                    </div>
                                </div>

                                <div class="full-input-box">
                                    <label class="field-label">Verification</label>
                                    <div class="cap-in">
                                        <box-icon name='ghost' color='#94a3b8' size='20px'></box-icon>
                                        <input type="text" id="captchaInput" placeholder="Enter Captcha" required
                                            maxlength="6">
                                        <div class="captcha-right">
                                            <span id="captcha-text"></span>
                                            <button type="button" class="captcha-refresh-btn" id="refreshCaptcha"
                                                title="Refresh Captcha">
                                                <box-icon name='refresh' color='#64748b' size='22px'
                                                    class="refresh-icon"></box-icon>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div class="checkbox">
                                    <input type="checkbox" id="agreement">
                                    <label for="agreement">I Agree To The
                                        <a href="/signup/login/terms.html" target="_blank">Terms &amp; Conditions</a>
                                    </label>
                                </div>

                                <div class="below">
                                    <div class="reg-btn">
                                        <button type="submit" id="signupButton" disabled>SIGN UP </button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>

        <!--------------------------------------------------BOTTOM BAR------------------------------------------------->
        <div class="bottom-column">
            <h3 style="color: white;">Copyright © 2025-2026, Designed, Developed & Hosted By National Informatics
                Center, Meghalaya State Center Shillong</h3>
        </div>

    </div>
</body>
<script src="/signup/login/login.js"></script>

</html>
